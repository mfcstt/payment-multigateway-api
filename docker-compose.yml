version: '3.9'

services:
  app:
    image: node:22-alpine
    working_dir: /usr/src/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3333:3333"
    environment:
      TZ: UTC
      PORT: 3333
      HOST: 0.0.0.0
      NODE_ENV: development
      LOG_LEVEL: info
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost:3333
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: adonis_user
      DB_PASSWORD: adonis_password
      DB_DATABASE: adonis_db
      GATEWAY_1_BASE_URL: http://gateway-mock:3001
      GATEWAY_1_EMAIL: dev@betalent.tech
      GATEWAY_1_TOKEN: FEC9BB078BF338F464F96B48089EB498
      GATEWAY_2_BASE_URL: http://gateway-mock:3002
      GATEWAY_2_AUTH_TOKEN: tk_f2198cc671b5289fa856
      GATEWAY_2_AUTH_SECRET: 3d15e8ed6131446ea7e3456728b1211f
    depends_on:
      - db
      - gateway-mock
    volumes:
      - ./:/usr/src/app

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: adonis_db
      MYSQL_USER: adonis_user
      MYSQL_PASSWORD: adonis_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  gateway-mock:
    image: matheusprotzen/gateways-mock
    restart: unless-stopped
    environment:
      TZ: UTC
    ports:
      - "3001:3001"
      - "3002:3002"

volumes:
  db_data:

version: "3.8"

services:
  db:
    image: mysql:8.1
    container_name: adonis_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: adonis_db
      MYSQL_USER: adonis_user
      MYSQL_PASSWORD: adonis_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - adonis_network

volumes:
  db_data:

networks:
  adonis_network:
    driver: bridge